name: create-release

# craft-base isn't a Plugin Store plugin, so instead of the Store's
# `craftcms/new-release` dispatch this fires on the tag push itself and
# pulls the release notes from the matching CHANGELOG.md section.
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from changelog
        run: |
          awk -v ver="$GITHUB_REF_NAME" '
            $0 ~ "^## " ver "( |$)" { found = 1; next }
            /^## / && found { exit }
            found { print }
          ' CHANGELOG.md | sed -e '/./,$!d' > release-notes.md
          if ! [ -s release-notes.md ]; then
            echo "No changelog section found for $GITHUB_REF_NAME" >&2
            exit 1
          fi

      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
